<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCC.Nail.Studieo 預約系統</title>
    <style>
        /* 核心樣式 - 確保畫面不會空白 */
        body { background-color: #FDFBF7; font-family: sans-serif; margin: 0; padding: 20px; }
        #notification-popup { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background-color: #5A4E44; color: white; padding: 15px 25px; border-radius: 50px; z-index: 9999; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .loading-text { text-align: center; font-size: 1.2rem; color: #8C7A6B; margin-top: 50px; }
    </style>
</head>
<body>

    <!-- 新通知提醒 -->
    <div id="notification-popup" onclick="location.reload()">🔔 有新預約！點此重新整理</div>
    
    <!-- 系統容器 -->
    <div id="app-container">
        <h1>CCC.Nail.Studieo</h1>
        <div id="loading-text" class="loading-text">☁️ 系統載入中...</div>
        <!-- 這裡會由下方的 JS 動態注入妳原本的日曆與表單 -->
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArhVMBzEVlpZeuHdeYK5_VO0NjERlst7k",
            authDomain: "ccc-nail-system.firebaseapp.com",
            projectId: "ccc-nail-system",
            storageBucket: "ccc-nail-system.firebasestorage.app",
            messagingSenderId: "762564904502",
            appId: "1:762564904502:web:6c638cff9994b8632c3a97"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const recordsCollection = collection(db, "nail_records");

        let firstLoad = true;
        let lastCount = 0;

        onSnapshot(recordsCollection, (snapshot) => {
            // 隱藏讀取文字
            const loadText = document.getElementById('loading-text');
            if(loadText) loadText.style.display = 'none';

            // 檢查新資料通知
            if (!firstLoad && snapshot.size > lastCount) {
                document.getElementById('notification-popup').style.display = 'block';
            }
            
            firstLoad = false;
            lastCount = snapshot.size;

            // 如果原本的頁面內容不見了，這裡可以呼叫妳原本的渲染函數
            // 例如：renderCalendarView(); renderDayRecordsView();
            console.log("資料庫連線正常，目前筆數：", snapshot.size);
        });
    </script>
</body>
</html>
