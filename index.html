<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCC.Nail.Studieo 預約系統</title>
    <!-- CSS 樣式跟之前一樣，為確保運作我們先專注於 JS 修正 -->
    <style>
        body { background-color: #FDFBF7; font-family: sans-serif; }
        .cloud-loading-banner { text-align: center; padding: 20px; font-weight: bold; color: #8C7A6B; }
    </style>
</head>
<body>
    <div id="loading-banner" class="cloud-loading-banner">☁️ 雲端資料同步中...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArhVMBzEVlpZeuHdeYK5_VO0NjERlst7k",
            authDomain: "ccc-nail-system.firebaseapp.com",
            projectId: "ccc-nail-system",
            storageBucket: "ccc-nail-system.firebasestorage.app",
            messagingSenderId: "762564904502",
            appId: "1:762564904502:web:6c638cff9994b8632c3a97"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        try {
            const recordsCollection = collection(db, "nail_records");
            onSnapshot(recordsCollection, (snapshot) => {
                document.getElementById('loading-banner').innerText = "✅ 連線成功，系統載入中...";
                console.log("資料已成功抓取，筆數：", snapshot.size);
                // 這裡會接著繼續執行原本的 render 函式
            }, (err) => {
                document.getElementById('loading-banner').innerText = "⚠️ 請使用網頁伺服器開啟 (Live Server)";
                console.error("連線錯誤:", err);
            });
        } catch (e) {
            console.error("初始化錯誤:", e);
        }
    </script>
</body>
</html>
