<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCC.Nail.Studieo 預約記帳系統 (雲端連動版)</title>
    <style>
        /* 韓系奶油風：溫柔、低飽和度的燕麥、奶茶與摩卡色調 */
        :root {
            --bg-cream: #FDFBF7;
            --card-cream: #F5EFEB;
            --soft-oat: #E8DCD3;
            --warm-mocha: #8C7A6B;
            --deep-mocha: #5A4E44;
            --accent-rose: #D9C3B0;
            --text-dark: #4A3E3D;
            --white: #FFFFFF;
            --tag-new: #E8D5C4;
            --tag-old: #D2E0D6;
            --shadow: 0 8px 24px rgba(140, 122, 107, 0.06);
        }

        /* 新增：Google 行事曆按鈕樣式 */
        .btn-gcal {
            background-color: #4285f4;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            margin-top: 8px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: background 0.2s;
        }
        .btn-gcal:hover { background-color: #357ae8; }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-dark);
            padding-bottom: 40px;
        }

        header {
            text-align: center;
            padding: 25px 20px 15px 20px;
        }
        
        header h1 {
            font-size: 1.4rem;
            letter-spacing: 2px;
            color: var(--deep-mocha);
            font-weight: 600;
        }

        header p {
            font-size: 0.8rem;
            color: var(--warm-mocha);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .toolbar {
            display: flex;
            justify-content: space-around;
            background-color: var(--card-cream);
            margin: 0 16px 20px 16px;
            padding: 6px;
            border-radius: 30px;
            box-shadow: 0 4px 12px rgba(140, 122, 107, 0.08);
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .tool-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 12px 0;
            font-size: 0.95rem;
            color: var(--warm-mocha);
            font-weight: 500;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.2s ease;
        }

        .tool-btn.active {
            background-color: var(--white);
            color: var(--deep-mocha);
            font-weight: 600;
            box-shadow: 0 2px 6px rgba(140, 122, 107, 0.1);
        }

        .page {
            display: none;
            padding: 0 16px;
        }

        .page.active {
            display: block;
        }

        .content-card {
            background-color: var(--white);
            border-radius: 24px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(232, 220, 211, 0.5);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.1rem;
            color: var(--deep-mocha);
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* --- 月曆 --- */
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .calendar-nav button {
            background: none;
            border: none;
            color: var(--warm-mocha);
            font-size: 1.2rem;
            padding: 0 15px;
            cursor: pointer;
        }

        .calendar-title-selectors {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .select-subtle {
            background-color: var(--card-cream);
            border: 1px solid transparent;
            color: var(--deep-mocha);
            font-size: 1.05rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
            width: auto;
            text-align: center;
            transition: all 0.2s ease;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        .select-subtle:focus {
            border-color: var(--warm-mocha);
            background-color: var(--white);
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 0.8rem;
            color: var(--warm-mocha);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 10px;
            text-align: center;
        }

        .day-cell {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 42px;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .day-cell.other-month {
            color: #D1C7BD;
        }

        .day-number {
            width: 34px;
            height: 34px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .day-cell.target-active .day-number {
            background-color: var(--deep-mocha);
            color: var(--bg-cream) !important;
            font-weight: bold;
        }

        .day-cell.is-today:not(.target-active) .day-number {
            border: 1.5px solid var(--warm-mocha);
            color: var(--deep-mocha);
        }

        .has-record::after {
            content: '';
            position: absolute;
            bottom: 2px;
            width: 4px;
            height: 4px;
            background-color: var(--warm-mocha);
            border-radius: 50%;
        }
        .day-cell.target-active.has-record::after {
            background-color: var(--bg-cream);
        }

        /* 表單樣式 */
        .quick-add-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--soft-oat);
        }

        .form-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            position: relative;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--warm-mocha);
        }

        input[type="text"], input[type="number"], input[type="date"], input[type="tel"], select {
            background-color: var(--bg-cream);
            border: 1px solid var(--soft-oat);
            padding: 10px 12px;
            border-radius: 12px;
            color: var(--text-dark);
            font-size: 0.9rem;
            outline: none;
            width: 100%;
        }

        input:focus, select:focus {
            border-color: var(--warm-mocha);
        }

        /* 客製化浮動下拉選單 */
        .custom-dropdown-menu {
            display: none;
            position: absolute;
            top: 64px;
            left: 0;
            width: 100%;
            background-color: var(--white);
            border: 1px solid var(--soft-oat);
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(140, 122, 107, 0.15);
            max-height: 200px;
            overflow-y: auto;
            z-index: 999;
        }

        .custom-dropdown-item {
            padding: 10px 14px;
            font-size: 0.9rem;
            color: var(--text-dark);
            cursor: pointer;
            border-bottom: 1px solid rgba(232, 220, 211, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .custom-dropdown-item:last-child {
            border-bottom: none;
        }
        .custom-dropdown-item:active {
            background-color: var(--card-cream);
        }
        .dropdown-item-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .dropdown-item-handle {
            font-size: 0.75rem;
            color: var(--warm-mocha);
            font-style: italic;
        }

        .checkbox-group, .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background-color: var(--bg-cream);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--soft-oat);
        }

        .check-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-dark);
            cursor: pointer;
            padding: 2px 4px;
        }

        .check-label input {
            accent-color: var(--warm-mocha);
            width: 16px;
            height: 16px;
        }

        .gender-label-with-avatar {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .history-pref-hint {
            display: none;
            background-color: #F4EFEA;
            border-left: 3px solid var(--accent-rose);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            color: #7A6250;
            margin-top: -4px;
            line-height: 1.5;
        }

        .btn-submit {
            background-color: var(--warm-mocha);
            color: var(--white);
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
            font-size: 0.95rem;
            transition: background-color 0.2s ease;
        }
        .btn-submit:active { background-color: var(--deep-mocha); }
        .btn-submit.editing-mode { background-color: #7E8E7F; }

        /* 紀錄清單 */
        .record-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 14px 16px;
            background-color: var(--bg-cream);
            border-radius: 16px;
            border-left: 5px solid var(--soft-oat);
        }

        .record-item.income { border-left-color: #C3D3C4; } 
        .record-item.expense { border-left-color: #E3C3C3; } 

        .record-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            padding-right: 10px;
        }

        .record-main {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .avatar-canvas-box {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(140, 122, 107, 0.12);
            border: 1.5px solid var(--white);
        }
        .avatar-canvas-box canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .record-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-left: 2px;
        }

        .tag {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 600;
        }
        .tag.new-cust { background-color: var(--tag-new); color: #7A583A; }
        .tag.old-cust { background-color: var(--tag-old); color: #3A5440; }
        .tag.source-tag { background-color: #E6E1DA; color: var(--deep-mocha); }
        .tag.expense-tag { background-color: #F0E6E6; color: #A66363; }
        .tag.astro-tag { background-color: #EAE6FF; color: #5247A1; }
        .tag.time-tag { background-color: #F0EDE6; color: var(--deep-mocha); font-weight: 700; letter-spacing: 0.5px; }
        .tag.atmos-tag { background-color: #FDF1E6; color: #B37D4E; font-weight: 600; }
        
        .tag-item {
            font-size: 0.75rem;
            background-color: #EFECE8;
            color: var(--warm-mocha);
            padding: 1px 5px;
            border-radius: 4px;
        }

        .record-details {
            font-size: 0.8rem;
            color: var(--warm-mocha);
            margin-top: 2px;
            line-height: 1.4;
        }

        .record-amount-zone {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            justify-content: center;
        }

        .record-amount {
            font-size: 0.95rem;
            font-weight: 700;
            white-space: nowrap;
        }
        
        .income .record-amount { color: #5A735B; }
        .expense .record-amount { color: #A66363; }

        .action-btns {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-action {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            padding: 2px;
            opacity: 0.4;
            transition: opacity 0.2s;
        }
        .btn-action:active, .btn-action:hover { opacity: 1; }

        .no-data {
            text-align: center;
            color: var(--warm-mocha);
            font-size: 0.9rem;
            padding: 25px 0;
            font-style: italic;
        }

        .all-records-container {
            max-height: 55vh;
            overflow-y: auto;
        }

        .record-group-title {
            font-size: 0.85rem;
            color: var(--warm-mocha);
            margin: 15px 0 6px 4px;
            font-weight: 600;
        }

        /* 雲端載入提示 */
        .cloud-loading-banner {
            background-color: var(--card-cream);
            text-align: center;
            font-size: 0.8rem;
            color: var(--warm-mocha);
            padding: 4px;
            font-weight: bold;
        }

        /* --- 報表分頁樣式 --- */
        .report-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .summary-box {
            background-color: var(--bg-cream);
            padding: 15px;
            border-radius: 16px;
            text-align: center;
        }

        .summary-box p {
            font-size: 0.8rem;
            color: var(--warm-mocha);
            margin-bottom: 5px;
        }

        .summary-box h3 {
            font-size: 1.2rem;
            color: var(--deep-mocha);
        }

        .summary-box.profit {
            grid-column: span 2;
            background-color: var(--card-cream);
        }

        .chart-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 10px;
        }

        .chart-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }

        .chart-label {
            width: 75px;
            color: var(--warm-mocha);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chart-bar-bg {
            flex: 1;
            background-color: var(--bg-cream);
            height: 16px;
            border-radius: 8px;
            overflow: hidden;
        }

        .chart-bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 8px;
        }
        .chart-bar-fill.income-bar { background-color: #C3D3C4; }
        .chart-bar-fill.expense-bar { background-color: #E3C3C3; }
        .chart-bar-fill.female-bar { background-color: #EAC7C7; }
        .chart-bar-fill.male-bar { background-color: #C7D4EA; }
        .chart-bar-fill.merchant-bar { background-color: #E1D5C9; }

        .chart-val {
            width: 110px;
            color: var(--deep-mocha);
            font-size: 0.8rem;
            font-weight: 500;
            text-align: right;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="loading-banner" class="cloud-loading-banner">☁️ 雲端資料同步中...</div>

    <header>
        <h1>CCC.Nail.Studieo</h1>
        <p>Accounting & Appointment System</p>
    </header>

    <div class="toolbar">
        <button class="tool-btn active" onclick="switchPage('calendar')">年月日曆</button>
        <button class="tool-btn" onclick="switchPage('all-records')">總紀錄</button>
        <button class="tool-btn" onclick="switchPage('report')">報表</button>
    </div>

    <div id="page-calendar" class="page active">
        <div class="content-card">
            <div class="calendar-nav">
                <button onclick="changeMonth(-1)">❮</button>
                <div class="calendar-title-selectors">
                    <select id="cal-year-select" class="select-subtle" onchange="onCalendarSelectorChange()"></select>
                    <select id="cal-month-select" class="select-subtle" onchange="onCalendarSelectorChange()"></select>
                </div>
                <button onclick="changeMonth(1)">❯</button>
            </div>
            <div class="weekdays">
                <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
            </div>
            <div class="days-grid" id="calendar-days-box"></div>
        </div>

        <div class="content-card">
            <div class="card-title">
                <span id="day-box-title">本日收支紀錄</span>
                <span style="font-size: 0.85rem; color: var(--warm-mocha);" id="day-box-date"></span>
            </div>
            <div class="record-list" id="day-records-list"></div>
            <div id="accounting-form-anchor" class="quick-add-form">
                <!-- 省略部分表單內容以保持簡潔 -->
                <button id="btn-submit-main" class="btn-submit" onclick="addNewRecord()">儲存此筆紀錄</button>
            </div>
        </div>
    </div>

    <div id="page-all-records" class="page">
        <div class="content-card">
            <div class="card-title">歷史明細總覽</div>
            <div class="all-records-container" id="all-records-list"></div>
        </div>
    </div>

    <div id="page-report" class="page">
        <!-- 內容省略 -->
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ... (省略 firebaseConfig 設定與初始化) ...

        // 新增 Google 行事曆生成邏輯
        window.addToGoogleCalendar = function(record) {
            const dateStr = record.date.replace(/-/g, '');
            const startTime = (record.customerTime || "10:00").replace(':', '');
            const endTime = (parseInt(record.customerTime ? record.customerTime.split(':')[0] : 10) + 2).toString().padStart(2, '0') + (record.customerTime ? record.customerTime.split(':')[1] : "00");

            const title = encodeURIComponent(`美甲預約: ${record.customer}`);
            const details = encodeURIComponent(`客戶電話: ${record.customerPhone || ''}\n備註: ${record.note || ''}`);
            const gCalUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dateStr}T${startTime}00Z/${dateStr}T${endTime}00Z&details=${details}&sf=true&output=xml`;
            window.open(gCalUrl, '_blank');
        };

        // 修改 createRecordRowNode 函數以顯示按鈕
        window.createRecordRowNode = function(r) {
            const item = document.createElement('div');
            item.className = `record-item ${r.type}`;
            const infoDiv = document.createElement('div');
            infoDiv.className = 'record-info';
            
            // ... (原有的顯示邏輯) ...

            if (r.type === 'income') {
                const gcalBtn = document.createElement('button');
                gcalBtn.className = 'btn-gcal';
                gcalBtn.innerHTML = '📅 加入 Google 行事曆';
                gcalBtn.onclick = () => window.addToGoogleCalendar(r);
                infoDiv.appendChild(gcalBtn);
            }

            item.appendChild(infoDiv);
            // ... (其餘邏輯) ...
            return item;
        }
    </script>
</body>
</html>
