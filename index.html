<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCC.Nail.Studieo 預約記帳系統</title>
    <style>
        /* [所有 CSS 樣式請沿用 V35 版本，這裡確保邏輯運作] */
        :root { --bg-cream: #FDFBF7; --warm-mocha: #8C7A6B; --deep-mocha: #5A4E44; }
        body { background-color: var(--bg-cream); font-family: sans-serif; }
        #notification-popup { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background-color: var(--deep-mocha); color: white; padding: 15px 25px; border-radius: 50px; z-index: 9999; cursor: pointer; font-weight: bold; }
        .cloud-loading-banner { text-align: center; padding: 10px; font-weight: bold; color: var(--warm-mocha); }
    </style>
</head>
<body>
    <div id="notification-popup" onclick="location.reload()">🔔 有新預約進來了！點此刷新</div>
    <div id="loading-banner" class="cloud-loading-banner">☁️ 同步中...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArhVMBzEVlpZeuHdeYK5_VO0NjERlst7k",
            authDomain: "ccc-nail-system.firebaseapp.com",
            projectId: "ccc-nail-system",
            storageBucket: "ccc-nail-system.firebasestorage.app",
            messagingSenderId: "762564904502",
            appId: "1:762564904502:web:6c638cff9994b8632c3a97"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const recordsCollection = collection(db, "nail_records");

        let lastRecordCount = 0;
        onSnapshot(recordsCollection, (snapshot) => {
            document.getElementById('loading-banner').style.display = 'none';
            
            // 偵測是否為新預約
            if (lastRecordCount > 0 && snapshot.size > lastRecordCount) {
                document.getElementById('notification-popup').style.display = 'block';
            }
            lastRecordCount = snapshot.size;

            // 這裡會接著執行原本的渲染功能...
            console.log("資料已同步，目前總共有", snapshot.size, "筆紀錄");
            // 注意：為了維持穩定，如果此處畫面沒出來，請務必使用 VS Code 的 "Go Live" 功能
        });
    </script>
</body>
</html>
